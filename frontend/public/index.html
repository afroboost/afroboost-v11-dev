        <!-- v55: NUCLEAR CACHE PURGE — Étape 1: Détruire TOUT ancien cache/SW -->
        <script>
            (function() {
                var V = 54;
                var forceKey = 'afroboost_v' + V + '_forced';
                // 1. Unregister ALL Service Workers (kills old cached HTML interception)
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        regs.forEach(function(r) {
                            console.log('[V51] Unregistering SW:', r.scope);
                            r.unregister();
                        });
                    });
                }
                // 2. Delete ALL Cache Storage entries
                if ('caches' in window) {
                    caches.keys().then(function(names) {
                        names.forEach(function(name) {
                            console.log('[V51] Deleting cache:', name);
                            caches.delete(name);
                        });
                    });
                }
                // 3. Force ONE hard reload per session if not done yet
                if (!sessionStorage.getItem(forceKey)) {
                    sessionStorage.setItem(forceKey, '1');
                    // Use cache-busting URL to bypass ALL levels of cache
                    var cleanUrl = window.location.pathname;
                    window.location.replace(cleanUrl + '?_v=v54&t=' + Date.now());
                    return; // Stop execution — page will reload
                }
            })();
        </script>
        <!-- v55: Étape 2: Re-register SW V51 proprement (APRÈS purge) -->
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    // Register with version query to force fresh fetch
                    navigator.serviceWorker.register('/sw.js?v=51', { updateViaCache: 'none' })
                        .then(function(reg) {
                            console.log('[V51] SW registered, scope:', reg.scope);
                            reg.update();
                            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                            reg.addEventListener('updatefound', function() {
                                var nw = reg.installing;
                                if (nw) nw.addEventListener('statechange', function() {
                                    if (nw.state === 'activated') console.log('[V51] New SW activated');
                                });
                            });
                        })
                        .catch(function(e) { console.log('[V51] SW fail:', e); });
                    navigator.serviceWorker.addEventListener('controllerchange', function() {
                        console.log('[V51] Controller changed — SW update complete');
                    });
