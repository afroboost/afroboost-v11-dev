        <script>
            console.log("🚀 V124 : SW ES5 + loading screen + auto-reset");
            // V121: Force update SW + hard reload si version obsolète
            // FIX: Utilise sessionStorage au lieu de ?_reloaded=1 pour ne pas polluer l'URL
            // (les query params empêchaient Chrome de matcher start_url et bloquer l'install PWA)
            (function() {
                var CURRENT_VERSION = '124';
                var lastVersion = '';
                try { lastVersion = localStorage.getItem('af_app_version') || ''; } catch(e) {}
                // Toujours forcer un update du SW
                if ('serviceWorker' in navigator) {
                    navigator.serviceWorker.getRegistration().then(function(reg) {
                        if (reg) reg.update();
                    }).catch(function() {});
                }
                // V121: Nettoyer l'URL si elle contient encore ?_reloaded=1 d'une ancienne version
                if (window.location.search.includes('_reloaded=1')) {
                    var cleanUrl = window.location.pathname + (window.location.hash || '');
                    window.history.replaceState(null, '', cleanUrl);
                }
                // Si la version a changé, purger les caches et faire UN reload
                var reloadKey = 'af_version_reload_' + CURRENT_VERSION;
                if (lastVersion && lastVersion !== CURRENT_VERSION && !sessionStorage.getItem(reloadKey)) {
                    try { localStorage.setItem('af_app_version', CURRENT_VERSION); } catch(e) {}
                    try { sessionStorage.setItem(reloadKey, '1'); } catch(e) {}
                    // Purger les caches via API si disponible
                    if ('caches' in window) {
                        caches.keys().then(function(names) {
                            names.forEach(function(name) { caches.delete(name); });
                        }).then(function() {
                            window.location.reload(true);
                        });
                    } else {
                        window.location.reload(true);
                    }
                } else {
                    try { localStorage.setItem('af_app_version', CURRENT_VERSION); } catch(e) {}
                }
            })();
            // v64: Nettoyage localStorage — purger toute référence au slug "artboost"
            try {
                var keys = Object.keys(localStorage);
                for (var i = 0; i < keys.length; i++) {
                    if (keys[i].indexOf('artboost') !== -1 && keys[i] !== 'afroboost_coach_user') {
                        localStorage.removeItem(keys[i]);
                    }
                }
                // Purger le cache audio lié au mauvais slug
                localStorage.removeItem('afroboost_audio_cache_artboost');
            } catch(e) {}
        </script>

        <div id="root"></div>
        <!-- V124: Détection écran noir + auto-reset + diagnostic -->
        <script>
            (function() {
                var statusEl = document.getElementById('af-loader-status');
                var resetKey = 'af_auto_reset_v124';
                // Cacher le loader quand React monte
                var observer = new MutationObserver(function() {
                    var root = document.getElementById('root');
                    if (root && root.firstChild) {
                        var loader = document.getElementById('af-loader');
                        if (loader) loader.style.display = 'none';
                        observer.disconnect();
                    }
                });
                var root = document.getElementById('root');
                if (root) observer.observe(root, { childList: true });

                // Si React ne monte pas après 10s, afficher diagnostic + auto-reset
                setTimeout(function() {
                    var root = document.getElementById('root');
                    if (root && root.firstChild) return; // App chargée, tout va bien

                    if (statusEl) statusEl.textContent = 'Chargement lent... nettoyage en cours';

                    // Si on a déjà fait un auto-reset, afficher un message d'aide
                    if (sessionStorage.getItem(resetKey)) {
                        if (statusEl) {
                            statusEl.innerHTML = 'Erreur de chargement.<br><a href="/reset.html" style="color:#d91cd2;text-decoration:underline;">Cliquez ici pour réinitialiser</a>';
                        }
                        return;
                    }

                    console.warn('[V124] App non chargée après 10s — auto-reset');
                    sessionStorage.setItem(resetKey, '1');
                    var tasks = [];
                    if ('serviceWorker' in navigator) {
                        tasks.push(navigator.serviceWorker.getRegistrations().then(function(regs) {
                            return Promise.all(regs.map(function(r) { return r.unregister(); }));
                        }));
                    }
                    if ('caches' in window) {
                        tasks.push(caches.keys().then(function(names) {
                            return Promise.all(names.map(function(n) { return caches.delete(n); }));
                        }));
                    }
                    Promise.all(tasks).then(function() {
                        window.location.reload(true);
                    });
                }, 10000);
            })();
        </script>

        <!-- V121: Clean SW registration — plus de nuclear purge avec query params -->
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    // V121: Register SW sans query params (important pour PWA install)
                    navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
                        .then(function(reg) {
                            console.log('[V121] SW registered, scope:', reg.scope);
                            reg.update();
                            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                            reg.addEventListener('updatefound', function() {
                                var nw = reg.installing;
                                if (nw) nw.addEventListener('statechange', function() {
                                    if (nw.state === 'activated') console.log('[V121] New SW activated');
                                });
                            });
                        })
                        .catch(function(e) { console.log('[V121] SW fail:', e); });
                    navigator.serviceWorker.addEventListener('controllerchange', function() {
                        console.log('[V121] Controller changed — SW update complete');
                    });
                });
            }
