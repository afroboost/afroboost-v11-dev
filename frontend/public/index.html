        <script>
            // V139: Force update + version check + auto-purge
            (function() {
                var CURRENT_VERSION = '141';
                var lastVersion = '';
                try { lastVersion = localStorage.getItem('af_app_version') || ''; } catch(e) {}

                // Toujours forcer un update du SW
                if ('serviceWorker' in navigator) {
                    try {
                        navigator.serviceWorker.getRegistration().then(function(reg) {
                            if (reg) reg.update();
                        }).catch(function() {});
                    } catch(e) {}
                }

                // Nettoyer l'URL si elle contient des query params d'anciennes versions
                try {
                    if (window.location.search && window.location.search.indexOf('_reloaded') !== -1) {
                        var cleanUrl = window.location.pathname + (window.location.hash || '');
                        window.history.replaceState(null, '', cleanUrl);
                    }
                } catch(e) {}

                // Si la version a changé, purger les caches et faire UN reload
                var reloadKey = 'af_version_reload_' + CURRENT_VERSION;
                try {
                    if (lastVersion && lastVersion !== CURRENT_VERSION && !sessionStorage.getItem(reloadKey)) {
                        localStorage.setItem('af_app_version', CURRENT_VERSION);
                        sessionStorage.setItem(reloadKey, '1');
                        if ('caches' in window) {
                            caches.keys().then(function(names) {
                                for (var i = 0; i < names.length; i++) { caches.delete(names[i]); }
                            }).then(function() { window.location.reload(true); });
                        } else {
                            window.location.reload(true);
                        }
                    } else {
                        localStorage.setItem('af_app_version', CURRENT_VERSION);
                    }
                } catch(e) {
                    try { localStorage.setItem('af_app_version', CURRENT_VERSION); } catch(e2) {}
                }
            })();
        </script>

        <!-- V149: Splash screen dismissal — min 2.5s + fade out, avec fail-safe anti-écran noir -->
        <script>
            (function() {
                var splash = document.getElementById('af-splash');
                var splashStart = Date.now();
                var splashDismissed = false;
                var resetKey = 'af_auto_reset_v149';

                // V149: Fonction pour dismisser le splash avec fade out
                // Appelée par App.js via window.__dismissSplash() ou automatiquement
                window.__dismissSplash = function() {
                    if (splashDismissed || !splash) return;
                    splashDismissed = true;
                    var elapsed = Date.now() - splashStart;
                    var remaining = Math.max(0, 2500 - elapsed); // Garantir 2.5s minimum
                    setTimeout(function() {
                        if (!splash) return;
                        // Remplir la barre à 100% avant de fade out
                        var bar = document.getElementById('af-splash-bar');
                        if (bar) bar.style.width = '100%';
                        // Fade out après 300ms (temps pour voir le 100%)
                        setTimeout(function() {
                            if (splash) {
                                splash.style.opacity = '0';
                                splash.style.pointerEvents = 'none';
                                // Retirer du DOM après la transition
                                setTimeout(function() {
                                    if (splash && splash.parentNode) splash.parentNode.removeChild(splash);
                                }, 700);
                            }
                        }, 300);
                    }, remaining);
                };

                // Fallback: MutationObserver détecte quand React monte
                try {
                    var observer = new MutationObserver(function() {
                        var root = document.getElementById('root');
                        if (root && root.firstChild) {
                            window.__dismissSplash();
                            observer.disconnect();
                        }
                    });
                    var root = document.getElementById('root');
                    if (root) observer.observe(root, { childList: true });
                } catch(e) {}

                // Fail-safe: Cacher le splash après 6s max (même si React n'a pas appelé dismiss)
                setTimeout(function() {
                    if (!splashDismissed && splash) {
                        window.__dismissSplash();
                    }
                }, 6000);

                // PHASE 1 (5s) : Si React ne monte pas, tenter un auto-nettoyage + reload
                setTimeout(function() {
                    var root = document.getElementById('root');
                    if (root && root.firstChild) return; // OK

                    if (sessionStorage.getItem(resetKey)) {
                        // Déjà tenté un reset → montrer lien de réparation
                        if (splash) {
                            splash.innerHTML = '<div style="text-align:center;padding:24px;"><div style="color:#fff;font-size:16px;margin-bottom:16px;">Probl&egrave;me d&eacute;tect&eacute;</div><a href="/reset.html" style="color:#d91cd2;text-decoration:underline;font-size:15px;font-weight:600;">Appuyez ici pour r&eacute;parer</a></div>';
                        }
                        return;
                    }

                    try { sessionStorage.setItem(resetKey, '1'); } catch(e) {}
                    var tasks = [];
                    if ('serviceWorker' in navigator) {
                        tasks.push(
                            navigator.serviceWorker.getRegistrations().then(function(regs) {
                                var unregs = [];
                                for (var i = 0; i < regs.length; i++) { unregs.push(regs[i].unregister()); }
                                return Promise.all(unregs);
                            }).catch(function() {})
                        );
                    }
                    if ('caches' in window) {
                        tasks.push(
                            caches.keys().then(function(names) {
                                var dels = [];
                                for (var i = 0; i < names.length; i++) { dels.push(caches.delete(names[i])); }
                                return Promise.all(dels);
                            }).catch(function() {})
                        );
                    }
                    Promise.all(tasks).then(function() {
                        window.location.reload(true);
                    }).catch(function() {
                        window.location.reload(true);
                    });
                }, 5000);

                // PHASE 2 (10s) : Si toujours rien après le reload, rediriger vers /reset.html
                setTimeout(function() {
                    var root = document.getElementById('root');
                    if (root && root.firstChild) return;
                    setTimeout(function() {
                        window.location.replace('/reset.html');
                    }, 1000);
                }, 10000);
            })();
        </script>

        <!-- V121: Clean SW registration — plus de nuclear purge avec query params -->
        <script>
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    // V121: Register SW sans query params (important pour PWA install)
                    navigator.serviceWorker.register('/sw.js', { updateViaCache: 'none' })
                        .then(function(reg) {
                            console.log('[V121] SW registered, scope:', reg.scope);
                            reg.update();
                            if (reg.waiting) reg.waiting.postMessage({ type: 'SKIP_WAITING' });
                            reg.addEventListener('updatefound', function() {
                                var nw = reg.installing;
                                if (nw) nw.addEventListener('statechange', function() {
                                    if (nw.state === 'activated') console.log('[V121] New SW activated');
                                });
                            });
                        })
                        .catch(function(e) { console.log('[V121] SW fail:', e); });
                    // V130: Quand le SW se met à jour, recharger la page pour servir le nouveau contenu
                    // Empêche l'écran noir sur les PWA installées avec un ancien SW
                    var refreshing = false;
                    navigator.serviceWorker.addEventListener('controllerchange', function() {
                        console.log('[V130] Controller changed — reload pour nouveau contenu');
                        if (!refreshing) {
                            refreshing = true;
                            window.location.reload();
                        }
                    });
                    // V130: Écouter les messages du SW pour force-reload
                    navigator.serviceWorker.addEventListener('message', function(event) {
                        if (event.data && event.data.type === 'SW_UPDATED') {
                            console.log('[V130] SW mis à jour vers', event.data.version, '— reload');
                            if (!refreshing) {
                                refreshing = true;
                                window.location.reload();
                            }
                        }
                    });
                });
            }
