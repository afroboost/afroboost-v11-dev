<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Créer code - Admin Afroboost</title>
    <style>
        body { background: #0a0a0f; color: white; font-family: Arial; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: #1a1a2e; border-radius: 20px; padding: 40px; max-width: 500px; width: 90%; text-align: center; }
        h1 { color: #d91cd2; font-size: 22px; }
        .info { background: rgba(139,92,246,0.1); border: 1px solid rgba(139,92,246,0.3); border-radius: 12px; padding: 16px; margin: 20px 0; text-align: left; }
        .info p { margin: 8px 0; font-size: 14px; color: #ccc; }
        .info strong { color: #a855f7; }
        button { background: linear-gradient(135deg, #d91cd2, #8b5cf6); color: white; border: none; padding: 16px 40px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result { margin-top: 20px; padding: 16px; border-radius: 12px; display: none; }
        .success { background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3); color: #22c55e; }
        .error { background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3); color: #ef4444; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Créer le code pour Ry Vonbergen</h1>
        <div class="info">
            <p><strong>Email :</strong> ry.vonbergen@gmail.com</p>
            <p><strong>Produit :</strong> PULSE x10 cours</p>
            <p><strong>Séances :</strong> 10</p>
            <p><strong>Montant payé :</strong> 250 CHF</p>
        </div>
        <button id="btn" onclick="createCode()">Créer le code et envoyer l'email</button>
        <div id="result"></div>
    </div>
    <script>
        async function createCode() {
            var btn = document.getElementById('btn');
            var result = document.getElementById('result');
            btn.disabled = true;
            btn.textContent = 'Création en cours...';
            try {
                var res = await fetch('/api/admin/create-code', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        admin_email: 'contact.artboost@gmail.com',
                        customer_email: 'ry.vonbergen@gmail.com',
                        sessions: 10,
                        product_name: 'PULSE x10 cours',
                        customer_name: 'Ry Vonbergen',
                        amount: 250
                    })
                });
                var data = await res.json();
                if (data.code) {
                    result.className = 'success';
                    result.style.display = 'block';
                    result.innerHTML = '<strong>Code créé !</strong><br>Code : ' + data.code + '<br>Lien : ' + data.link + '<br><br>Un email a été envoyé à ry.vonbergen@gmail.com';
                } else {
                    result.className = 'error';
                    result.style.display = 'block';
                    result.innerHTML = '<strong>Erreur :</strong> ' + JSON.stringify(data);
                }
            } catch (err) {
                result.className = 'error';
                result.style.display = 'block';
                result.innerHTML = '<strong>Erreur :</strong> ' + err.message;
            }
            btn.disabled = false;
            btn.textContent = 'Créer le code et envoyer l\'email';
        }
    </script>
</body>
</html>
